<!DOCTYPE html>
<html lang="ko">
<head>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XPAIO Pi Network Test App</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            background-color: #f8fafc;
            color: #334155;
        }
        #logo {
            width: 180px;
            height: 180px;
            margin-bottom: 25px;
            border-radius: 20%;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            background-color: white;
        }
        h1 {
            color: #0ea5e9;
            font-size: 1.5rem;
            margin-bottom: 10px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 100%;
            max-width: 450px;
        }
        button {
            width: 100%;
            padding: 14px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            background-color: #0284c7;
            color: white;
            border: none;
            border-radius: 12px;
            transition: all 0.2s;
            margin-top: 20px;
        }
        button:active { transform: scale(0.98); }
        #status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.5;
            min-height: 50px;
        }
        .success { background-color: #ecfdf5; color: #065f46; border: 1px solid #10b981; }
        .error { background-color: #fef2f2; color: #991b1b; border: 1px solid #ef4444; }
        .loading { background-color: #f1f5f9; color: #475569; }
    </style>
</head>
<body>

    <div class="container">
        <img id="logo" src="logo.png" alt="XPAIO Logo">
        <h1>XPAIO 에어드랍 센터</h1>
        <p>파이 브라우저 전용 테스트 앱입니다.</p>

        <button onclick="checkPiStatus()">Pi SDK 인증 및 보상 확인</button>
        
        <div id="status" class="loading">준비 완료: 버튼을 눌러주세요.</div>
    </div>

    <script>
        // [수정사항 1] 페이지 로드 시 즉시 Pi SDK 초기화
        if (window.Pi) {
            window.Pi.init({ version: "2.0", sandbox: true });
            console.log("Pi SDK 초기화 완료 (Sandbox 모드)");
        }

        async function checkPiStatus() {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = '⏳ 파이 네트워크 연결 중...';
            statusDiv.className = 'loading';

            if (!window.Pi) {
                statusDiv.textContent = '❌ Pi SDK를 찾을 수 없습니다. 파이 브라우저에서 접속했는지 확인하세요.';
                statusDiv.className = 'error';
                return;
            }

            try {
                // [수정사항 2] 사용자 인증 요청 (username 및 payments 권한)
                const scopes = ['username', 'payments'];
                
                const user = await window.Pi.authenticate(scopes, onIncompletePayment);
                
                // 인증 성공 시 실행되는 로직
                statusDiv.innerHTML = `✅ <b>인증 성공!</b><br>사용자: ${user.user.username}<br>UID: ${user.user.uid.substring(0, 10)}...`;
                statusDiv.className = 'success';
                
                // 💡 [다음 단계 예고] 여기서 유저의 지갑 주소를 받아 토큰 전송 서버로 보낼 수 있습니다.
                console.log("인증 유저 정보:", user);

            } catch (error) {
                statusDiv.textContent = '❌ 인증 실패: ' + error.message;
                statusDiv.className = 'error';
            }
        }

        // [필수] 미완료 결제 건 처리 콜백 함수
        function onIncompletePayment(payment) {
            console.log("미완료 결제 발견:", payment);
            // 실제 서비스 시 서버에 이 결제 ID를 보내 완료 처리를 요청해야 합니다.
        }
    </script>
</body>
</html>

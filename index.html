<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XPAIO 에어드랍 센터</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; background-color: #f8fafc; }
        .container { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 450px; }
        #logo { width: 120px; height: 120px; margin-bottom: 20px; border-radius: 20%; }
        h1 { color: #0ea5e9; font-size: 1.5rem; }
        button { width: 100%; padding: 14px; font-size: 18px; font-weight: 600; cursor: pointer; background-color: #0284c7; color: white; border: none; border-radius: 12px; margin-top: 20px; }
        #status { margin-top: 20px; padding: 15px; border-radius: 10px; font-size: 14px; min-height: 50px; }
        .success { background-color: #ecfdf5; color: #065f46; border: 1px solid #10b981; }
        .error { background-color: #fef2f2; color: #991b1b; border: 1px solid #ef4444; }
        .loading { background-color: #f1f5f9; color: #475569; }
    </style>
</head>
<body>
    <div class="container">
        <img id="logo" src="logo.png" alt="XPAIO Logo">
        <h1>XPAIO 에어드랍 센터</h1>
        <p>은하수(Eunhasu)님의 파이 테스트넷 에어드랍</p>
        <button onclick="checkPiStatus()">Pi ID로 로그인 및 보상받기</button>
        <div id="status" class="loading">준비 완료: 버튼을 눌러주세요.</div>
    </div>

    <script>
        // SDK 초기화
        window.addEventListener('DOMContentLoaded', () => {
            if (window.Pi) {
                window.Pi.init({ version: "2.0", sandbox: true });
            }
        });

        function onIncompletePayment(payment) { console.log("미완료 결제:", payment); }

        async function checkPiStatus() {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = '⏳ 파이 네트워크 인증 중...';
            statusDiv.className = 'loading';

            try {
                const scopes = ['username', 'payments'];
                const authData = await window.Pi.authenticate(scopes, onIncompletePayment);
                const username = authData.user.username;

                statusDiv.innerHTML = `✅ <b>인증 성공!</b><br>환영합니다, <b>${username}</b>님!<br>🚀 10 XPAIO 보상을 전송합니다...`;
                
                // 보상 전송 함수 호출
                sendReward(username); 
            } catch (error) {
                statusDiv.textContent = '❌ 인증 실패: ' + error.message;
                statusDiv.className = 'error';
            }
        }

        async function sendReward(username) {
            const statusDiv = document.getElementById('status');
            try {
                const response = await fetch('/.netlify/functions/reward', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username })
                });
                const result = await response.json();
                if (response.ok) {
                    statusDiv.innerHTML = `🎊 <b>지급 완료!</b><br><b>${username}</b>님께 보상이 전송되었습니다!`;
                    statusDiv.className = 'success';
                } else { throw new Error(result.error); }
            } catch (error) {
                statusDiv.textContent = '❌ 보상 지급 실패: ' + error.message;
                statusDiv.className = 'error';
            }
        }
    </script>
</body>
</html>

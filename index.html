<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0ea5e9">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/logo.png">
    <title>XPAIO 에어드랍 센터</title>
    <script src="https://sdk.minepi.com/pi-sdk.js" defer></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; background-color: #f8fafc; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; width: 100%; max-width: 450px; }
        #logo { width: 120px; height: 120px; margin-bottom: 20px; border-radius: 20%; object-fit: cover; }
        h1 { color: #0ea5e9; font-size: 1.6rem; }
        button { width: 100%; padding: 16px; font-size: 18px; font-weight: 700; cursor: pointer; background-color: #0284c7; color: white; border: none; border-radius: 14px; margin-top: 20px; }
        #status { margin-top: 25px; padding: 18px; border-radius: 12px; font-size: 14px; min-height: 60px; }
        .success { background-color: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
        .error { background-color: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
        .loading { background-color: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
    </style>
</head>
<body>
    <div class="container">
        <img id="logo" src="logo.png" alt="XPAIO Logo">
        <h1>XPAIO 에어드랍 센터</h1>
        <p>은하수(Eunhasu)님의 파이 테스트넷 에어드랍</p>
        <button onclick="checkPiStatus()">Pi ID로 로그인 및 보상받기</button>
        <div id="status" class="loading">준비 완료: 버튼을 눌러주세요.</div>
    </div>

    <script>
        window.onload = () => {
            if (window.Pi) {
                window.Pi.init({ version: "2.0", sandbox: true });
            }
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('/sw.js').catch(() => {});
            }
        };

        async function checkPiStatus() {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = '⏳ <b>파이 네트워크 인증 중...</b>';
            statusDiv.className = 'loading';

            try {
                const scopes = ['username', 'payments'];
                const authData = await window.Pi.authenticate(scopes, (payment) => {
                    console.log("미완료 결제:", payment);
                });
                
                const username = authData.user.username;
                statusDiv.innerHTML = `✅ <b>인증 성공!</b><br>환영합니다, <b>${username}</b>님!<br>🚀 10 XPAIO 보상을 전송합니다...`;
                statusDiv.className = 'success';
                
                sendReward(username); 
            } catch (error) {
                statusDiv.innerHTML = `❌ <b>인증 실패</b><br>${error.message}`;
                statusDiv.className = 'error';
            }
        }

        async function sendReward(username) {
            const statusDiv = document.getElementById('status');
            try {
                const response = await fetch('/.netlify/functions/reward', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username })
                });
                const result = await response.json();
                if (response.ok) {
                    statusDiv.innerHTML = `🎊 <b>지급 완료!</b><br><b>${username}</b>님께 10 XPAIO 전송 성공!`;
                } else { throw new Error(result.error); }
            } catch (error) {
                statusDiv.innerHTML = `❌ <b>지급 실패</b><br>${error.message}`;
                statusDiv.className = 'error';
            }
        }
    </script>
</body>
</html>

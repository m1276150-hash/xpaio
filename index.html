<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XPAIO Pi Network 에어드랍</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            background-color: #f8fafc;
            color: #334155;
        }
        #logo {
            width: 150px;
            height: 150px;
            margin-bottom: 25px;
            border-radius: 20%;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            background-color: white;
            object-fit: cover;
        }
        h1 {
            color: #0ea5e9;
            font-size: 1.5rem;
            margin-bottom: 10px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 100%;
            max-width: 450px;
        }
        button {
            width: 100%;
            padding: 14px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            background-color: #0284c7;
            color: white;
            border: none;
            border-radius: 12px;
            transition: all 0.2s;
            margin-top: 20px;
        }
        button:active { transform: scale(0.98); }
        #status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.5;
            min-height: 50px;
        }
        .success { background-color: #ecfdf5; color: #065f46; border: 1px solid #10b981; }
        .error { background-color: #fef2f2; color: #991b1b; border: 1px solid #ef4444; }
        .loading { background-color: #f1f5f9; color: #475569; }
    </style>
</head>
<body>

    <div class="container">
        <img id="logo" src="logo.png" alt="XPAIO Logo">
        <h1>XPAIO 에어드랍 센터</h1>
        <p>파이 브라우저 전용 인증 시스템</p>

        <button onclick="checkPiStatus()">Pi ID로 로그인 및 보상받기</button>
        
        <div id="status" class="loading">준비 완료: 버튼을 눌러주세요.</div>
    </div>

    <script>
        // 1. 페이지 로드 시 안정적인 초기화
        window.addEventListener('DOMContentLoaded', (event) => {
            if (window.Pi) {
                try {
                    window.Pi.init({ version: "2.0", sandbox: true });
                    console.log("Pi SDK 초기화 성공 (Sandbox)");
                } catch (e) {
                    console.error("SDK 초기화 실패:", e);
                }
            }
        });

        // 2. 미완료 결제 건 처리 콜백 (SDK 승인 필수 조건)
        function onIncompletePayment(payment) {
            console.log("미완료 결제 건 발견:", payment);
        }

        async function checkPiStatus() {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = '⏳ 파이 네트워크 인증 팝업 대기 중...';
            statusDiv.className = 'loading';

            // SDK 존재 여부 재확인
            if (typeof Pi === 'undefined') {
                statusDiv.textContent = '❌ SDK 로드 실패. 파이 브라우저의 주소창에 URL을 직접 입력했는지 확인하세요.';
                statusDiv.className = 'error';
                return;
            }

            try {
                // 3. 사용자 인증 요청
                const scopes = ['username', 'payments'];
                const authData = await window.Pi.authenticate(scopes, onIncompletePayment);
                
                const username = authData.user.username;
                const uid = authData.user.uid;

                // 인증 성공 표시
                statusDiv.innerHTML = `✅ <b>인증 성공!</b><br>환영합니다, <b>${username}</b>님!<br><small>UID: ${uid.substring(0, 12)}...</small>`;
                statusDiv.className = 'success';
                
                console.log("인증 정보:", authData);

                // 💡 [다음 조치] 여기서 서버(Netlify Function)로 username을 보내서 10 XPAIO 전송 트리거 가능
                // sendReward(username); 

            } catch (error) {
                console.error("Auth Error:", error);
                statusDiv.textContent = '❌ 인증이 중단되었습니다: ' + (error.message || '다시 시도해 주세요.');
                statusDiv.className = 'error';
            }
        }
    </script>
</body>
</html>
